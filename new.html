<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Form Table</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/image5.jpg' %}">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;

       /* Background Image */
            background-image: url("{% static 'images/image7.jpg' %}");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
    }

    .container{
      width:80%;
      margin:50px auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0px 0px 10px gray;
    }

    h2{
      text-align:center;
    }

    table{
      width:100%;
      border-collapse:collapse;
      text-align:center;
    }

    th, td{
      border:1px solid #ccc;
      padding:12px;
    }

    th{
      background:blue;
      color:white;
    }

    input{
      width:90%;
      padding:8px;
    }

    button{
      padding:7px 15px;
      border:none;
      border-radius:5px;
      color:white;
      cursor:pointer;
    }

    .update{
      background:orange;
    }

    .delete{
      background:red;
    }
  </style>
</head>
<body>

  <div class="container">
    {% if messages %}
          {% for message in messages %}
              <div class = " alert alert-{{ message.tages }}">
                {{ message }}
              </div>
          {% endfor %}
          {% endif %}    
    <h2>User Table Form</h2>

    <table>

      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>Option</th>
      </tr>
{% for i in data %}
      <tr>
        <td>
         {{ i.name}} 
        </td>

        <td>
         {{i.email}}
        </td>

        <td>
          {{i.password}}
        </td>

        <td>
          <a href ="{% url 'update_submit' i.id %}">update</a>
          <a href = "{% url 'delete_data' i.id %}">delete</a>
          <!-- <button class="update">Update</button>
          <button class="delete">Delete</button> -->
        </td>
      </tr>
{% endfor %}
    </table>

  </div>

</body>
</html>
