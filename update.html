<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/image5.jpg' %}">

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .form-container{
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        label{
            font-weight: bold;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn-group{
            display: flex;
            justify-content: space-between;
        }

        button{
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .update-btn{
            background-color: green;
        }

        .cancel-btn{
            background-color: red;
        }

        .hero{
      height:90vh;
      background:url("{% static 'images/image3.jpg' %}") no-repeat center center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      position:relative;
    }

        button:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="form-container">
         {% if messages %}
          {% for message in messages %}
              <div class = " alert alert-{{ message.tages }}">
                {{ message }}
              </div>
          {% endfor %}
          {% endif %}   
        <h2>Signup Form</h2>

        <form action="{% url 'update_submit_data' data.id %}" method="POST">
            {% csrf_token %}
            <label>Name:</label>
            <input type="text" name = "name" value="{{data.name}}" placeholder="Enter your name">
           

            <label>Gender:</label>
            <select name = "gender">
                <option value="Male" {% if data.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female"{% if data.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other"{% if data.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>

            <label>Email:</label>
            <input type="email" name = "email"value="{{data.email}}" placeholder="Enter your email">

            <label>Password:</label>
            <input type="password"  name = "password"value="{{data.password}}" placeholder="Enter password">

            <div class="btn-group">
                <button type="submit" class="update-btn">update</button>
                <button type="reset" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
